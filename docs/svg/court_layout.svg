<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 960 510" width="960" height="510">

  <!-- 围栏（灰色虚线，扩大到 920×400 让 回收仓 标签完全在内部）-->
  <rect x="20" y="20" width="850" height="400" fill="#f5f5f5" stroke="#666" stroke-width="2" stroke-dasharray="6 4"/>
  <text x="28" y="35" font-family="Consolas,monospace" font-size="12" fill="#666">围栏 38.57 × 20.29 m</text>

  <!-- 场地外部背景（向下平移 20px 实现垂直居中：原 y=40 → y=60）-->
  <rect x="40" y="60" width="800" height="320" fill="#7cb342" fill-opacity="0.20" stroke="#558b2f" stroke-width="1.5"/>

  <!-- 半场底色 -->
  <rect x="40" y="60" width="400" height="320" fill="#bbdefb" fill-opacity="0.30"/>
  <rect x="440" y="60" width="400" height="320" fill="#ffe082" fill-opacity="0.30"/>

  <!-- 球场（深绿） -->
  <rect x="180" y="124" width="520" height="192" fill="#7cb342" fill-opacity="0.45" stroke="#33691e" stroke-width="1.5"/>

  <!-- 半场标题（移入球场上方，远离顶部杂乱区） -->
  <text x="218" y="148" font-family="Consolas,monospace" font-size="13" font-weight="bold" fill="#0d47a1" text-anchor="middle">X &lt; 0 半场（active_half = -1）</text>
  <text x="680" y="148" font-family="Consolas,monospace" font-size="13" font-weight="bold" fill="#bf360c" text-anchor="middle">X &gt; 0 半场（active_half = +1）</text>

  <!-- 绕网走廊（虚线蓝） -->
  <line x1="40" y1="97" x2="840" y2="97" stroke="#1565c0" stroke-width="1.5" stroke-dasharray="6 3"/>
  <line x1="40" y1="343" x2="840" y2="343" stroke="#1565c0" stroke-width="1.5" stroke-dasharray="6 3"/>
  <text x="48" y="83" font-family="Consolas,monospace" font-size="10" fill="#0d47a1">绕网走廊 Y=+7.05</text>
  <text x="48" y="365" font-family="Consolas,monospace" font-size="10" fill="#0d47a1">绕网走廊 Y=-7.05</text>

  <!-- 球网 -->
  <line x1="440" y1="60" x2="440" y2="380" stroke="#d32f2f" stroke-width="3"/>
  <text x="440" y="56" font-family="Consolas,monospace" font-size="12" font-weight="bold" fill="#b71c1c">球网 X=0</text>

  <!-- 网柱 -->
  <circle cx="440" cy="108" r="5" fill="#000"/>
  <circle cx="440" cy="332" r="5" fill="#000"/>
  <text x="448" y="112" font-family="Consolas,monospace" font-size="9" fill="#333">网柱 Y=+6.40</text>
  <text x="448" y="336" font-family="Consolas,monospace" font-size="9" fill="#333">网柱 Y=-6.40</text>

  <!-- 长椅 (X=0, Y=±8.345, 1.5×0.4m)：放短标签避免与 半场 / 网柱 重叠 -->
  <rect x="424" y="70" width="32" height="8" fill="#5d4037" stroke="#3e2723" stroke-width="1"/>
  <text x="392" y="76" font-family="Consolas,monospace" font-size="10" fill="#3e2723" text-anchor="end">长椅 #2</text>
  <rect x="424" y="362" width="32" height="8" fill="#5d4037" stroke="#3e2723" stroke-width="1"/>
  <text x="392" y="370" font-family="Consolas,monospace" font-size="10" fill="#3e2723" text-anchor="end">长椅 #1</text>

  <!-- 回收仓（合并为单行标签，右对齐避免溢出） -->
  <rect x="816" y="60" width="24" height="24" fill="#fb8c00" stroke="#e65100" stroke-width="1.5"/>
  <text x="840" y="55" font-family="Consolas,monospace" font-size="12" font-weight="bold" fill="#bf360c" text-anchor="end">📦 回收仓 (17.9, 8.6) 0.8×1m</text>

  <!-- X>0 半场巡视 U 形（橙色）：x_near=5m → 屏幕 550；x_far=15.785 → 787 -->
  <line x1="550" y1="342" x2="550" y2="98" stroke="#ff5722" stroke-width="2.5" stroke-opacity="0.9"/>
  <line x1="550" y1="98"  x2="787" y2="98" stroke="#ff5722" stroke-width="2.5" stroke-opacity="0.9"/>
  <line x1="787" y1="98"  x2="787" y2="342" stroke="#ff5722" stroke-width="2.5" stroke-opacity="0.9"/>
  <polygon points="783,330 791,330 787,342" fill="#ff5722"/>

  <circle cx="550" cy="342" r="11" fill="#ff5722" stroke="#fff" stroke-width="2"/>
  <text x="550" y="346" font-family="Consolas,monospace" font-size="11" font-weight="bold" fill="#fff" text-anchor="middle">0</text>
  <circle cx="550" cy="98"  r="11" fill="#ff5722" stroke="#fff" stroke-width="2"/>
  <text x="550" y="102" font-family="Consolas,monospace" font-size="11" font-weight="bold" fill="#fff" text-anchor="middle">1</text>
  <circle cx="787" cy="98"  r="11" fill="#ff5722" stroke="#fff" stroke-width="2"/>
  <text x="787" y="102" font-family="Consolas,monospace" font-size="11" font-weight="bold" fill="#fff" text-anchor="middle">2</text>
  <circle cx="787" cy="342" r="11" fill="#ff5722" stroke="#fff" stroke-width="2"/>
  <text x="787" y="346" font-family="Consolas,monospace" font-size="11" font-weight="bold" fill="#fff" text-anchor="middle">3</text>

  <!-- X<0 半场巡视 U 形（紫色，镜像） -->
  <line x1="330" y1="342" x2="330" y2="98" stroke="#8e24aa" stroke-width="2.5" stroke-opacity="0.9"/>
  <line x1="330" y1="98"  x2="93"  y2="98" stroke="#8e24aa" stroke-width="2.5" stroke-opacity="0.9"/>
  <line x1="93"  y1="98"  x2="93"  y2="342" stroke="#8e24aa" stroke-width="2.5" stroke-opacity="0.9"/>
  <polygon points="89,330 97,330 93,342" fill="#8e24aa"/>

  <circle cx="330" cy="342" r="11" fill="#8e24aa" stroke="#fff" stroke-width="2"/>
  <text x="330" y="346" font-family="Consolas,monospace" font-size="11" font-weight="bold" fill="#fff" text-anchor="middle">0</text>
  <circle cx="330" cy="98"  r="11" fill="#8e24aa" stroke="#fff" stroke-width="2"/>
  <text x="330" y="102" font-family="Consolas,monospace" font-size="11" font-weight="bold" fill="#fff" text-anchor="middle">1</text>
  <circle cx="93"  cy="98"  r="11" fill="#8e24aa" stroke="#fff" stroke-width="2"/>
  <text x="93"  y="102" font-family="Consolas,monospace" font-size="11" font-weight="bold" fill="#fff" text-anchor="middle">2</text>
  <circle cx="93"  cy="342" r="11" fill="#8e24aa" stroke="#fff" stroke-width="2"/>
  <text x="93"  y="346" font-family="Consolas,monospace" font-size="11" font-weight="bold" fill="#fff" text-anchor="middle">3</text>

  <!-- 绕网路径示意（蓝色，仅为一个示例；实际起点 = bypass 触发时 YouBot 的当前位置）-->
  <circle cx="374" cy="220" r="6" fill="#1976d2" fill-opacity="0.4" stroke="#1976d2" stroke-width="1.5" stroke-dasharray="2 2"/>
  <text x="352" y="244" font-family="Consolas,monospace" font-size="10" fill="#0d47a1">示例起点</text>
  <text x="312" y="256" font-family="Consolas,monospace" font-size="9" fill="#1565c0" font-style="italic">(实际起点 = YouBot 当前位置)</text>
  <line x1="374" y1="220" x2="374" y2="100" stroke="#1976d2" stroke-width="2.5"/>
  <polygon points="370,104 378,104 374,96" fill="#1976d2"/>
  <line x1="374" y1="97" x2="504" y2="97" stroke="#1976d2" stroke-width="2.5"/>
  <polygon points="500,93 500,101 508,97" fill="#1976d2"/>
  <text x="386" y="170" font-family="Consolas,monospace" font-size="10" fill="#0d47a1">① 上走廊</text>
  <text x="430" y="89" font-family="Consolas,monospace" font-size="10" fill="#0d47a1">② 横穿球网</text>

  <!-- 图例（下移避开扩大后的围栏底部） -->
  <rect x="20" y="430" width="850" height="65" fill="#fafafa" stroke="#bdbdbd" stroke-width="1"/>
  <circle cx="36" cy="448" r="7" fill="#ff5722"/>
  <text x="50" y="452" font-family="Consolas,monospace" font-size="13" fill="#333">X&gt;0 半场巡视 U 形 (0→1→2→3)</text>
  <circle cx="276" cy="448" r="7" fill="#8e24aa"/>
  <text x="290" y="452" font-family="Consolas,monospace" font-size="13" fill="#333">X&lt;0 半场巡视（镜像）</text>
  <circle cx="468" cy="448" r="6" fill="#1976d2"/>
  <text x="482" y="452" font-family="Consolas,monospace" font-size="13" fill="#333">绕网路径</text>
  <rect x="566" y="444" width="14" height="8" fill="#5d4037"/>
  <text x="586" y="452" font-family="Consolas,monospace" font-size="13" fill="#333">长椅</text>
  <rect x="624" y="442" width="12" height="12" fill="#fb8c00" stroke="#e65100"/>
  <text x="642" y="452" font-family="Consolas,monospace" font-size="13" fill="#333">回收仓</text>
  <text x="36" y="475" font-family="Consolas,monospace" font-size="12" fill="#555">巡视规则：每次进入半场时，比较 YouBot 到点 0 与点 3 的距离，从更近端点开始单程走完 4 个点；</text>
  <text x="36" y="488" font-family="Consolas,monospace" font-size="12" fill="#555">途中检测到当前半场内的球立即中断，交还 RL Agent。</text>
</svg>
